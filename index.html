<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      padding: 10px;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 15px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-group input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .input-group input:focus {
      border-color: #6c63ff;
    }

    .input-number {
      width: 80px !important;
      flex: none !important;
      text-align: center;
    }

    .input-number::-webkit-inner-spin-button {
      opacity: 1;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #6c63ff;
      color: #fff;
      box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.6);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.16);
    }

        .player-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .player-item {
      flex: 1 1 280px;
      max-width: 400px;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      aspect-ratio: 16 / 9;
      max-height: 180px;
    }

    .player-item iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      color: rgba(255, 255, 255, 0.25);
      font-size: 14px;
      gap: 12px;
    }

    .placeholder-icon {
      font-size: 48px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>▶ YouTube Player</h1>
    <p class="subtitle">Paste any YouTube link and watch it instantly</p>

    <div class="input-group">
      <input type="text" id="urlInput" value="https://youtu.be/eFm2AWodLDU?si=PFv3Mpi_5KOQEjIy" autofocus>
      <input type="number" id="timesInput" class="input-number" value="40" min="1" max="50">
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="loadVideo()">Load Video</button>
      <button class="btn btn-secondary" onclick="replayVideo()">Replay All</button>
    </div>

    <div class="player-grid" id="playerContainer">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🎬</div>
        <span>Your video will appear here</span>
      </div>
    </div>
  </div>

  <script>
    let currentVideoId = null;
    let players = [];

    function getVideoId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]+)/,
        /(?:youtu\.be\/)([a-zA-Z0-9_-]+)/,
        /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    function onYouTubeIframeAPIReady() {
      loadVideo();
    }

    function destroyPlayers() {
      players.forEach(p => p.destroy());
      players = [];
    }

    let playerCounter = 0;

    function createPlayer(containerId, videoId) {
      const player = new YT.Player(containerId, {
        videoId,
        playerVars: { rel: 0, autoplay: 1 },
        events: {
          onReady: (e) => {
            e.target.unMute();
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.ENDED) {
              e.target.seekTo(0);
              e.target.playVideo();
            }
          }
        }
      });
      return player;
    }

    function renderPlayers(id, count) {
      destroyPlayers();
      const container = document.getElementById('playerContainer');
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.className = 'player-item';
        div.id = 'player-' + Date.now() + '-' + i;
        container.appendChild(div);
        players.push(createPlayer(div.id, id));
      }
    }

    function loadVideo() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return alert('Please enter a YouTube URL.');
      const id = getVideoId(url);
      if (!id) return alert('Invalid YouTube URL.');
      currentVideoId = id;
      const count = parseInt(document.getElementById('timesInput').value) || 4;
      renderPlayers(id, count);
    }

    function replayVideo() {
      if (!currentVideoId) return alert('Load a video first.');
      const count = parseInt(document.getElementById('timesInput').value) || 4;
      renderPlayers(currentVideoId, count);
    }

    function loadYTAPI() {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }
    loadYTAPI();
  </script>
</body>
</html>
